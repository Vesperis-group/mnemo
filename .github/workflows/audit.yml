name: Audit (DevSecOps)

# Audit de sécurité et de la chaîne d'approvisionnement.
# Tourne sur les PR et les push sur main. Indépendant de la CI principale pour
# que les outils d'audit n'allongent pas le cycle de build/test habituel.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Permet un déclenchement manuel depuis l'onglet Actions.
  workflow_dispatch:

# Permissions minimales : lecture seule du dépôt.
permissions:
  contents: read

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  supply-chain:
    name: cargo audit / deny / machete
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install audit tools
        run: |
          cargo install cargo-audit --locked || true
          cargo install cargo-deny --locked || true
          cargo install cargo-machete --locked || true

      - name: cargo audit (vulnérabilités RustSec)
        run: cargo audit

      - name: cargo deny check (licences, avis, sources)
        run: cargo deny check

      - name: cargo machete (dépendances inutilisées)
        run: cargo machete

  secrets:
    name: gitleaks (détection de secrets)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Le binaire CLI open-source est utilisé directement plutôt que l'action
      # gitleaks/gitleaks-action@v2, qui exige une licence payante sur les
      # dépôts appartenant à une organisation GitHub.
      - name: Install gitleaks CLI
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.27.2"
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        run: |
          gitleaks detect \
            --source . \
            --redact \
            --verbose \
            --exit-code 1
