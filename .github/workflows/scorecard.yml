name: Scorecard

# OpenSSF Scorecard : evalue la posture de securite open source du depot
# (politiques de branche, epinglage des actions, permissions des workflows,
# detection de secrets, etc.) et publie le resultat sur le service public
# Scorecard (badge README) ainsi que dans l'onglet Security (Code Scanning).
#
# Ce workflow ne publie aucune release et ne modifie pas le produit. Permissions
# minimales : lecture seule au niveau workflow ; le job ajoute uniquement
# `id-token: write` (requis par `publish_results: true`) et
# `security-events: write` (remontee SARIF dans Code Scanning).
#
# Actions epinglees par SHA de commit complet (supply chain). Le tag lisible est
# rappele en commentaire. Pour mettre a jour :
#   git ls-remote https://github.com/<owner>/<repo>.git refs/tags/<tag>
# (pour un tag annote, utiliser le SHA de la ligne `refs/tags/<tag>^{}`) puis
# remplacer le hash ET le commentaire de version. Runner epingle sur ubuntu-24.04.
on:
  branch_protection_rule:
  schedule:
    # Lundi 07h00 UTC (decale des autres workflows planifies pour lisser la charge).
    - cron: "0 7 * * 1"
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: OpenSSF Scorecard
    runs-on: ubuntu-24.04
    permissions:
      # Lecture du depot, jeton OIDC pour la publication, ecriture des alertes
      # de securite (SARIF). Aucune autre permission accordee.
      contents: read
      id-token: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          # Alimente le badge public Scorecard via le service api.scorecard.dev.
          publish_results: true

      - name: Upload Scorecard SARIF artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: scorecard-results
          path: scorecard-results.sarif
          retention-days: 5
          if-no-files-found: error

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: scorecard-results.sarif
