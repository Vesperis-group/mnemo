name: Release

# Déclenché à chaque push sur main (typiquement le merge d'une PR).
# release-it bumpe la version (Cargo.toml), met à jour le CHANGELOG, crée le
# tag vX.Y.Z, pousse le commit de release et publie la GitHub Release avec ses
# artefacts Linux (musl statique + GNU/glibc 2.35).
#
# Linux uniquement (pas de Windows ni macOS).
#
# Choix d'architecture : un seul job sur ubuntu-22.04. Pourquoi pas une matrice
# multi-runner ? Parce que release-it crée la Release ET attache les assets de
# manière atomique ; tout construire dans un job unique évite les courses entre
# jobs (qui crée la release ? qui attache quoi ?) et reste simple à maintenir.
#   - musl  : binaire statique, construit via la cible x86_64-unknown-linux-musl.
#   - glibc : binaire GNU construit nativement sur ubuntu-22.04 -> glibc 2.35,
#             compatible avec les distributions récentes ET un peu plus anciennes.
# L'ajout futur d'aarch64 (cross-compilation) pourra se faire en étendant la
# liste des cibles dans le hook `after:bump` de release-it.json.
#
# Garde anti-boucle : le commit de release contient « [skip ci] ». GitHub ignore
# nativement les évènements push/pull_request dont le message HEAD contient
# « [skip ci] ». La condition `if` ci-dessous est une double sécurité.
on:
  push:
    branches: [main]

# Permissions minimales par défaut : lecture seule. Seul le job `publish`
# élève ses permissions à `contents: write` (création de release/tag/commit).
# Les jobs de qualité et d'audit n'ont jamais accès en écriture ni au token de
# publication.
permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

# ---------------------------------------------------------------------------
# Chaîne de publication STRICTEMENT séquencée :
#
#   quality ─┐
#            ├─► publish   (needs: [quality, audit], if: success())
#   audit  ──┘
#
# Aucune release n'est publiée si la qualité (fmt/clippy/tests/build) OU
# l'audit (cargo-deny/cargo-audit/gitleaks) échoue. Le packaging produit des
# archives glibc + musl avec leur `.sha256`, vérifiées (`sha256sum -c`) par
# scripts/package-release.sh ; un checksum invalide avorte la publication.
#
# Actions épinglées par SHA de commit complet (supply chain). Pour mettre à
# jour : `git ls-remote https://github.com/<owner>/<repo>.git refs/tags/<tag>`
# (tag annoté → ligne `^{}`), puis remplacer le hash ET le commentaire.
#
# Rust figé par rust-toolchain.toml (rustup du runner ; pas de canal flottant
# ni d'action tierce pour la toolchain). Node figé par .node-version. Outils
# cargo d'audit installés en VERSION EXACTE. Les jobs `quality`/`publish`
# restent sur ubuntu-22.04 (lien glibc 2.35 volontaire pour l'asset GNU).
# ---------------------------------------------------------------------------

jobs:
  # ----- 1. Qualité : fmt, clippy, tests, build (bloquant) -----
  quality:
    name: Quality gate (fmt, clippy, tests, build)
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Rust (pinned via rust-toolchain.toml)
        run: |
          rustup show
          rustc --version
          rustup show active-toolchain

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          prefix-key: v0-rust-ubuntu2204

      - name: Fetch dependencies (locked)
        run: cargo fetch --locked

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --locked

      - name: Build release (sanity)
        run: cargo build --locked --release

      - name: Build musl (sanity)
        run: cargo build --locked --release --target x86_64-unknown-linux-musl

      - name: Shell scripts syntax check
        run: |
          bash -n scripts/install.sh
          bash -n scripts/uninstall.sh
          bash -n scripts/lib/bashrc.sh
          bash -n scripts/package-release.sh

  # ----- 2. Audit supply chain : cargo-deny, cargo-audit, gitleaks (bloquant) -----
  audit:
    name: Audit supply chain (deny, audit, gitleaks)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - name: Checkout (historique complet pour gitleaks)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup Rust (pinned via rust-toolchain.toml)
        run: |
          rustup show
          rustc --version
          rustup show active-toolchain

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Fetch dependencies (locked)
        run: cargo fetch --locked

      - name: Install audit tools (versions exactes)
        run: |
          cargo install cargo-audit --version 0.22.2 --locked
          cargo install cargo-deny --version 0.19.8 --locked

      - name: Print tool versions
        run: |
          cargo audit --version
          cargo deny --version

      - name: cargo audit (vulnérabilités RustSec)
        run: cargo audit

      - name: cargo deny check (licences, avis, sources)
        run: cargo deny check

      - name: Install gitleaks CLI (checksum vérifié)
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.27.2"
          GITLEAKS_SHA256="141c3b2dede46d8b3a53b47116da756bd223decc0374797559a6b50ecba5590c"
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        run: gitleaks detect --source . --redact --verbose --exit-code 1

  # ----- 3. Publication : build + package + checksum + GitHub Release -----
  # Ne s'exécute QUE si `quality` ET `audit` ont réussi. Seul ce job dispose de
  # `contents: write` et reçoit le token de publication.
  publish:
    name: Build Linux (musl + glibc2.35) et publication
    needs: [quality, audit]
    if: ${{ success() && !contains(github.event.head_commit.message, '[skip ci]') }}
    # glibc 2.35 : le binaire GNU est lié à la glibc du runner.
    runs-on: ubuntu-22.04
    permissions:
      contents: write # commit, tag, push, création de release
      pull-requests: read # lecture du contexte des PR (changelog)
    steps:
      - name: Checkout (historique complet)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          # RELEASE_TOKEN (PAT) si main est protégée et n'autorise pas le
          # GITHUB_TOKEN à pousser ; sinon repli sur le token par défaut.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Rust (pinned via rust-toolchain.toml)
        run: |
          rustup show
          rustc --version
          rustup show active-toolchain

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # IMPORTANT : la clé par défaut ne distingue pas la version d'image
          # (« Linux » seulement). Les artefacts hôte de build-scripts compilés
          # sur ubuntu-24.04 (glibc 2.39) seraient alors restaurés ici, sur
          # ubuntu-22.04 (glibc 2.35), et échoueraient à l'exécution
          # (« version `GLIBC_2.39' not found »). On isole donc le cache par
          # image de runner.
          prefix-key: v0-rust-ubuntu2204

      - name: Setup Node.js (.node-version)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: ".node-version"
          cache: npm

      - name: Install release tooling
        run: npm ci

      - name: Audit des dépendances npm (prod)
        run: npm audit --omit=dev

      - name: Fetch dependencies (locked)
        run: cargo fetch --locked

      - name: Inspect binaries (file / ldd)
        run: |
          cargo build --locked --release
          cargo build --locked --release --target x86_64-unknown-linux-musl
          echo "== GNU/glibc =="
          file target/release/mnemo
          ldd target/release/mnemo || true
          echo "== musl (statique attendu) =="
          file target/x86_64-unknown-linux-musl/release/mnemo
          ldd target/x86_64-unknown-linux-musl/release/mnemo || true

      # ----- Release versionnée (bump + tag + GitHub Release + artefacts) -----
      # Les binaires définitifs sont (re)construits APRÈS le bump de version par
      # le hook `after:bump` de release-it.json, afin que `mnemo version` reporte
      # la bonne version. Le packaging génère les `.tar.gz` + `.sha256` (glibc et
      # musl), vérifie chaque checksum (`sha256sum -c`) puis les archives sont
      # attachées via le glob d'assets de release-it.json.
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run release-it
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: npm run release
