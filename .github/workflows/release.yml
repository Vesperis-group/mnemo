name: Release

# Déclenché à chaque push sur main (typiquement le merge d'une PR).
# release-it bumpe la version (Cargo.toml), met à jour le CHANGELOG, crée le
# tag vX.Y.Z, pousse le commit de release et publie la GitHub Release avec ses
# artefacts Linux (musl statique + GNU/glibc 2.35).
#
# Linux uniquement (pas de Windows ni macOS).
#
# Choix d'architecture : un seul job sur ubuntu-22.04. Pourquoi pas une matrice
# multi-runner ? Parce que release-it crée la Release ET attache les assets de
# manière atomique ; tout construire dans un job unique évite les courses entre
# jobs (qui crée la release ? qui attache quoi ?) et reste simple à maintenir.
#   - musl  : binaire statique, construit via la cible x86_64-unknown-linux-musl.
#   - glibc : binaire GNU construit nativement sur ubuntu-22.04 -> glibc 2.35,
#             compatible avec les distributions récentes ET un peu plus anciennes.
# L'ajout futur d'aarch64 (cross-compilation) pourra se faire en étendant la
# liste des cibles dans le hook `after:bump` de release-it.json.
#
# Garde anti-boucle : le commit de release contient « [skip ci] ». GitHub ignore
# nativement les évènements push/pull_request dont le message HEAD contient
# « [skip ci] ». La condition `if` ci-dessous est une double sécurité.
on:
  push:
    branches: [main]

# Permissions minimales nécessaires à release-it.
permissions:
  contents: write # commit, tag, push, création de release
  pull-requests: read # lecture du contexte des PR (changelog)

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build Linux (musl + glibc2.35) et publication
    # glibc 2.35 : le binaire GNU est lié à la glibc du runner.
    runs-on: ubuntu-22.04
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - name: Checkout (historique complet)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # RELEASE_TOKEN (PAT) si main est protégée et n'autorise pas le
          # GITHUB_TOKEN à pousser ; sinon repli sur le token par défaut.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install release tooling
        run: npm ci

      # ----- Quality gate complet avant toute release -----
      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test

      - name: Build release (sanity)
        run: cargo build --release

      - name: Build musl (sanity)
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Inspect binaries (file / ldd)
        run: |
          echo "== GNU/glibc =="
          file target/release/mnemo
          ldd target/release/mnemo || true
          echo "== musl (statique attendu) =="
          file target/x86_64-unknown-linux-musl/release/mnemo
          ldd target/x86_64-unknown-linux-musl/release/mnemo || true

      - name: Shell scripts syntax check
        run: |
          bash -n scripts/install.sh
          bash -n scripts/uninstall.sh
          bash -n scripts/lib/bashrc.sh
          bash -n scripts/package-release.sh

      # ----- Release versionnée (bump + tag + GitHub Release + artefacts) -----
      # Les binaires définitifs sont (re)construits APRÈS le bump de version par
      # le hook `after:bump` de release-it.json, afin que `mnemo version` reporte
      # la bonne version. Les archives sont ensuite attachées via le glob d'assets.
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run release-it
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: npm run release
